app = "uk-due-diligence-mcp"
primary_region = "lhr"  # London — closest to CH/Gazette APIs

[build]

[env]
  PORT = "8080"
  # Set secrets via: fly secrets set CH_API_KEY=xxx CHARITY_API_KEY=xxx MCP_SERVER_KEY=xxx

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
